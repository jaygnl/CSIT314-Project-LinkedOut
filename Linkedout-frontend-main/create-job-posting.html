<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LinkedOut | Create Job Posting</title>
        <link rel="stylesheet" href="css/themes.css" />
        <link rel="stylesheet" href="css/style.css" />
        <style>
            .form-card {
                flex: 1;
                padding: 24px;
            }
            .form-card h2 {
                font-size: 18px;
                font-weight: 800;
                margin-bottom: 20px;
            }

            .mode-row {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                margin-top: 4px;
            }
            .mode-btn {
                padding: 7px 16px;
                border: 1.5px solid var(--border);
                border-radius: 20px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                color: var(--text-muted);
                background: transparent;
                transition: all 0.15s;
            }
            .mode-btn:hover,
            .mode-btn.active {
                border-color: var(--primary);
                color: var(--primary);
                background: var(--primary-light);
            }

            .form-actions {
                display: flex;
                gap: 10px;
                margin-top: 20px;
                padding-top: 16px;
                border-top: 1px solid var(--border);
            }

            /* Right panel */
            .posting-right {
                width: 210px;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .panel {
                padding: 14px;
            }
            .panel-title {
                font-size: 10px;
                font-weight: 700;
                color: var(--text-soft);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                margin-bottom: 10px;
            }

            .preview-box {
                background: var(--input-bg);
                border-radius: 8px;
                min-height: 70px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                color: var(--text-soft);
                text-align: center;
                padding: 12px;
                margin-bottom: 8px;
            }
            .tip {
                font-size: 11px;
                color: var(--text-soft);
                font-style: italic;
            }

            .status-row {
                display: flex;
                gap: 6px;
            }
            .status-opt {
                flex: 1;
                padding: 7px 4px;
                border: 1px solid var(--border);
                border-radius: 6px;
                font-size: 11px;
                font-weight: 700;
                text-align: center;
                cursor: pointer;
                color: var(--text-muted);
                transition: all 0.15s;
                user-select: none;
            }
            .status-opt:hover,
            .status-opt.active {
                border-color: var(--primary);
                color: var(--primary);
                background: var(--primary-light);
            }

            .save-draft-btn {
                width: 100%;
                padding: 9px;
                background: transparent;
                border: 1px solid var(--border);
                border-radius: 8px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                color: var(--text-muted);
                margin-bottom: 8px;
                transition: background 0.15s;
            }
            .save-draft-btn:hover {
                background: var(--input-bg);
            }

            .publish-big-btn {
                width: 100%;
                padding: 14px;
                background: var(--primary);
                color: #fff;
                border: none;
                border-radius: 8px;
                font-size: 15px;
                font-weight: 800;
                cursor: pointer;
                transition: background 0.15s;
            }
            .publish-big-btn:hover {
                background: var(--primary-hover);
            }
        </style>
    </head>
    <body class="light">
        <header class="app-header">
            <div class="header-inner">
                <a id="headerLogo" class="logo" href="employer-dashboard.html"
                    >LinkedOut</a
                >
                <div class="header-search-wrap">
                    <input
                        id="headerSearchInput"
                        type="text"
                        placeholder="🔍 Search..."
                    />
                </div>
                <nav class="header-nav" aria-label="Navigation">
                    <button
                        class="nav-btn"
                        id="navHome"
                        type="button"
                        aria-label="Home"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path
                                d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
                            />
                            <polyline points="9 22 9 12 15 12 15 22" />
                        </svg>
                    </button>
                    <button
                        class="nav-btn"
                        id="navNotifications"
                        type="button"
                        aria-label="Notifications"
                        style="position: relative"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path
                                d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"
                            />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                        <span class="notif-badge"></span>
                    </button>
                    <button
                        id="themeToggleBtn"
                        class="nav-btn"
                        type="button"
                        aria-label="Toggle theme"
                    >
                        🌙
                    </button>
                </nav>
            </div>
        </header>

        <div class="page-layout">
            <aside class="app-sidebar">
                <div class="sidebar-label">Employer Dashboard</div>
                <ul class="sidebar-nav">
                    <li>
                        <a
                            href="employer-dashboard.html"
                            id="sidebarPostings"
                            class="active"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <rect
                                    x="3"
                                    y="3"
                                    width="18"
                                    height="18"
                                    rx="2"
                                />
                                <path d="M3 9h18M9 21V9" /></svg
                            >My Job Postings</a
                        >
                    </li>
                    <li>
                        <a
                            href="employer-candidates.html"
                            id="sidebarCandidates"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path
                                    d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"
                                />
                                <circle cx="12" cy="7" r="4" /></svg
                            >Candidates</a
                        >
                    </li>
                    <li>
                        <a href="employer-settings.html" id="sidebarSettings">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <circle cx="12" cy="12" r="3" />
                                <path
                                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                                /></svg
                            >Settings</a
                        >
                    </li>
                    <hr class="sidebar-divider" />
                    <li>
                        <button id="sidebarLogoutBtn">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path
                                    d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"
                                />
                                <polyline points="16 17 21 12 16 7" />
                                <line x1="21" y1="12" x2="9" y2="12" /></svg
                            >Log Out
                        </button>
                    </li>
                </ul>
            </aside>

            <main class="page-main">
                <div class="card form-card" id="createJobForm">
                    <h2>Create New Job Posting</h2>

                    <div class="form-group">
                        <label for="jobTitle">Job Title</label>
                        <input
                            type="text"
                            class="form-control"
                            id="jobTitle"
                            name="job-title"
                            placeholder="e.g. Senior Frontend Developer"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label for="companyNameField">Company Name</label>
                        <input
                            type="text"
                            class="form-control"
                            id="companyNameField"
                            name="company-name"
                            placeholder="e.g. TechVision Inc."
                        />
                    </div>
                    <div class="form-group">
                        <label for="jobDescription">Job Description</label>
                        <textarea
                            class="form-control"
                            id="jobDescription"
                            name="job-description"
                            placeholder="Describe the role, responsibilities, and what makes it exciting..."
                        ></textarea>
                    </div>
                    <div class="form-group">
                        <label for="requiredEducation"
                            >Required Education</label
                        >
                        <select
                            class="form-control"
                            id="requiredEducation"
                            name="education"
                        >
                            <option value="">Select level</option>
                            <option>High School</option>
                            <option>Associate Degree</option>
                            <option>Bachelor's Degree</option>
                            <option>Master's Degree</option>
                            <option>PhD</option>
                            <option>No requirement</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="requiredSkills">Required Skills</label>
                        <input
                            type="text"
                            class="form-control"
                            id="requiredSkills"
                            name="skills"
                            placeholder="e.g. React, Node.js, MongoDB (comma-separated)"
                        />
                    </div>
                    <div class="form-group">
                        <label for="yearsExperience">Years of Experience</label>
                        <input
                            type="number"
                            class="form-control"
                            id="yearsExperience"
                            name="experience"
                            placeholder="Minimum years required"
                            min="0"
                        />
                    </div>
                    <div class="form-group">
                        <label>Work Mode</label>
                        <div class="mode-row" id="workModeSelect">
                            <button
                                class="mode-btn active"
                                id="btnModeRemote"
                                data-mode="Remote"
                                type="button"
                            >
                                Remote
                            </button>
                            <button
                                class="mode-btn"
                                id="btnModeOnsite"
                                data-mode="On-site"
                                type="button"
                            >
                                On-site
                            </button>
                            <button
                                class="mode-btn"
                                id="btnModeHybrid"
                                data-mode="Hybrid"
                                type="button"
                            >
                                Hybrid
                            </button>
                        </div>
                        <input
                            type="hidden"
                            id="workModeInput"
                            name="work-mode"
                            value="Remote"
                        />
                    </div>
                    <div class="form-group">
                        <label for="jobLocation">Job Location</label>
                        <input
                            type="text"
                            class="form-control"
                            id="jobLocation"
                            name="job-location"
                            placeholder="e.g. Sydney, NSW"
                        />
                    </div>
                    <div class="form-group">
                        <label for="jobType">Job Type</label>
                        <select
                            class="form-control"
                            id="jobType"
                            name="job-type"
                        >
                            <option>Full-time</option>
                            <option>Part-time</option>
                            <option>Contract</option>
                            <option>Internship</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="applicantLimit">Applicant Limit</label>
                        <input
                            type="number"
                            class="form-control"
                            id="applicantLimit"
                            name="applicant-limit"
                            placeholder="Max number of applicants"
                            min="1"
                        />
                    </div>

                    <div class="form-actions" id="formActions">
                        <button
                            class="secondary-btn"
                            id="btnPreview"
                            type="button"
                        >
                            Preview
                        </button>
                        <button
                            class="secondary-btn save-draft-btn"
                            id="btnSaveDraftBottom"
                            type="button"
                            style="min-height: 40px"
                        >
                            Save Draft
                        </button>
                        <button
                            class="primary-btn"
                            id="btnPublishBottom"
                            type="button"
                        >
                            Publish Job
                        </button>
                    </div>
                </div>

                <!-- Right panel -->
                <aside class="posting-right" id="postingRightPanel">
                    <div class="card panel" id="jobCardPreviewBox">
                        <div class="panel-title">Job Card Preview</div>
                        <div class="preview-box" id="jobCardPreviewPlaceholder">
                            Fill in details to preview
                        </div>
                        <p class="tip">
                            💡 Clear descriptions get 3× more applicants
                        </p>
                    </div>

                    <div class="card panel" id="applicantLimitControlBox">
                        <div class="panel-title">Applicant Limit</div>
                        <input
                            type="number"
                            class="form-control"
                            id="applicantLimitPanel"
                            name="applicant-limit-panel"
                            placeholder="Set max applicants"
                            min="1"
                        />
                    </div>

                    <div class="card panel" id="postingStatusBox">
                        <div class="panel-title">Posting Status</div>
                        <div class="status-row">
                            <div class="status-opt active" id="statusDraft">
                                Draft
                            </div>
                            <div class="status-opt" id="statusOpen">Open</div>
                            <div class="status-opt" id="statusClosed">
                                Closed
                            </div>
                        </div>
                    </div>

                    <button
                        class="save-draft-btn"
                        id="btnSaveDraftPanel"
                        type="button"
                    >
                        [ Save Draft ]
                    </button>
                    <button
                        class="publish-big-btn"
                        id="btnPublishPanel"
                        type="button"
                    >
                        Publish
                    </button>
                </aside>
            </main>
        </div>

        <div id="toast"></div>

        <script src="js/theme.js"></script>
        <script src="js/toast.js"></script>
        <script src="js/api.js"></script>
        <script src="js/create-job-posting.js"></script>
        <script src="js/notifications.js"></script>
    </body>
</html>
