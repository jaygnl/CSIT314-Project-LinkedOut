<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedOut | Candidates</title>
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .candidates-area { flex: 1; display: flex; flex-direction: column; gap: 16px; }
    .section-heading { font-size: 20px; font-weight: 800; }
    .section-sub     { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    .candidate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .candidate-card { padding: 16px; transition: box-shadow 0.2s, opacity 0.3s; }
    .candidate-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
    .card-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .candidate-avatar { width: 46px; height: 46px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: #fff; flex-shrink: 0; }
    .candidate-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
    .candidate-role { font-size: 12px; color: var(--text-muted); }
    .candidate-loc  { font-size: 12px; color: var(--text-soft); margin-top: 2px; }
    .card-btns { display: flex; gap: 8px; }
    .btn-accept { background: var(--primary); color: #fff; flex: 1; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; }
    .btn-accept:hover { background: var(--primary-hover); }
    .btn-reject { background: var(--red); color: #fff; flex: 1; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; }
    .btn-reject:hover { background: var(--red-hover); }
    .tag-featured { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
  </style>
</head>
<body class="light">

  <header class="app-header">
    <div class="header-inner">
      <a id="headerLogo" class="logo" href="employer-dashboard.html">LinkedOut</a>
      <div class="header-search-wrap">
        <input id="headerSearchInput" type="text" placeholder="🔍 Search candidates..." />
      </div>
      <nav class="header-nav" aria-label="Navigation">
        <button class="nav-btn" id="navHome" type="button" aria-label="Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <button class="nav-btn" id="navNotifications" type="button" aria-label="Notifications" style="position:relative;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-badge"></span>
        </button>
        <button id="themeToggleBtn" class="nav-btn" type="button" aria-label="Toggle theme">🌙</button>
      </nav>
    </div>
  </header>

  <div class="page-layout">

    <aside class="app-sidebar">
      <div class="sidebar-label">Employer Dashboard</div>
      <ul class="sidebar-nav">
        <li><a href="employer-dashboard.html" id="sidebarPostings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>My Job Postings</a></li>
        <li><a href="employer-candidates.html" id="sidebarCandidates" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Candidates</a></li>
        <li><a href="employer-settings.html" id="sidebarSettings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a></li>
        <hr class="sidebar-divider" />
        <li><button id="sidebarLogoutBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</button></li>
      </ul>
    </aside>

    <main class="page-main">
      <div class="candidates-area">
        <div>
          <h1 class="section-heading">Browse Candidates</h1>
          <p class="section-sub" id="candidatesSub">Search and filter the entire talent pool</p>
        </div>

        <div class="card" style="padding:14px;">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:end;">
            <div style="flex:1;min-width:180px;">
              <label style="font-size:11px;color:var(--text-soft);font-weight:700;">Search</label>
              <input class="form-control" id="candSearchInput" type="text" placeholder="e.g. python, machine learning" />
            </div>
            <div>
              <label style="font-size:11px;color:var(--text-soft);font-weight:700;">Skill</label>
              <input class="form-control" id="filterSkill" type="text" placeholder="e.g. React" style="max-width:130px;" />
            </div>
            <div>
              <label style="font-size:11px;color:var(--text-soft);font-weight:700;">Education</label>
              <select class="form-control" id="filterEducation" style="max-width:150px;">
                <option value="">Any</option>
                <option>Associate Degree</option>
                <option>Bachelor's Degree</option>
                <option>Master's Degree</option>
                <option>PhD</option>
              </select>
            </div>
            <div>
              <label style="font-size:11px;color:var(--text-soft);font-weight:700;">Work mode</label>
              <select class="form-control" id="filterWorkMode" style="max-width:120px;">
                <option value="">Any</option><option>Remote</option><option>Hybrid</option><option>On-site</option>
              </select>
            </div>
            <div>
              <label style="font-size:11px;color:var(--text-soft);font-weight:700;">Min exp (yrs)</label>
              <input class="form-control" id="filterExpMin" type="number" min="0" placeholder="0" style="max-width:90px;" />
            </div>
            <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);cursor:pointer;">
              <input type="checkbox" id="fuzzyToggle" style="accent-color:var(--primary);" /> Fuzzy
            </label>
            <button class="btn-accept" id="candSearchBtn" type="button" style="flex:0 0 auto;padding:9px 16px;">Search</button>
            <button class="secondary-btn" id="candClearBtn" type="button" style="min-height:38px;">Clear</button>
          </div>
        </div>

        <div id="candidateGrid" class="candidate-grid">
          <div class="card" style="padding:24px;text-align:center;color:var(--text-muted);grid-column:1/-1;">Loading candidates…</div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast"></div>

  <script src="js/theme.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script src="js/employer-candidates.js"></script>
  <script src="js/notifications.js"></script>
</body>
</html>
